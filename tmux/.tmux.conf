# Use vi key bindings in copy mode
set -g mode-keys vi


# Change prefix to Ctrl-a (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -sg escape-time 0

set -g status-style bg=default
set -g message-style bg=default

# Smart pane navigation:
# - inside vim/nvim, pass Ctrl+h/j/k/l through to the editor
# - otherwise, use tmux pane movement
set -g @is_vim '#{||:#{==:#{pane_current_command},vim},#{==:#{pane_current_command},nvim}}'
bind -n C-h if-shell -F '#{@is_vim}' 'send-keys C-h' 'select-pane -L'
bind -n BSpace if-shell -F '#{@is_vim}' 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell -F '#{@is_vim}' 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell -F '#{@is_vim}' 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell -F '#{@is_vim}' 'send-keys C-l' 'select-pane -R'

# Vertical split
bind | split-window -h

# Horizontal split
bind - split-window -v

unbind '"'
unbind %


set -g history-limit 100000


set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"


set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g detach-on-destroy off

setw -g monitor-activity on
set -g visual-activity on


bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r < swap-pane -U
bind -r > swap-pane -D


set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[bold]#S"
set -g status-right "#(whoami)@#H | %Y-%m-%d %H:%M"
