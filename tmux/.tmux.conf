# Use vi key bindings in copy mode
set -g mode-keys vi


# Change prefix to Ctrl-a (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -sg escape-time 0

set -g status-style bg=default
set -g message-style bg=default

# Start window and pane numbering at 1.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Smart pane navigation:
# - inside editors, pass Ctrl+h/j/k/l through
# - otherwise, use tmux pane movement
set -g @is_editor '#{||:#{==:#{pane_current_command},vim},#{||:#{==:#{pane_current_command},nvim},#{||:#{==:#{pane_current_command},emacs},#{==:#{pane_current_command},emacsclient}}}}'
bind -n C-h if-shell -F '#{@is_editor}' 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell -F '#{@is_editor}' 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell -F '#{@is_editor}' 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell -F '#{@is_editor}' 'send-keys C-l' 'select-pane -R'

# New window in the active pane's working directory
bind c new-window -c "#{pane_current_path}"

# Vertical split
bind | split-window -h -c "#{pane_current_path}"

# Horizontal split
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %


set -g history-limit 100000
set -g focus-events on


set -g default-terminal "tmux-256color"
set -g set-clipboard on
set -g xterm-keys on
set -as terminal-features ",*:extkeys"
set -as terminal-overrides ",*:RGB"


set -g automatic-rename on
# Use the pane's working directory for window names so idle shells are still informative.
set -g automatic-rename-format "#{b:pane_current_path}"

set -g detach-on-destroy off

setw -g monitor-activity on
set -g visual-activity on

# Native switchers and project session launcher.
bind s choose-tree -sZ
bind w choose-tree -wZ
bind C-s switch-client -l
bind f run-shell "$HOME/Sources/dotfiles/scripts/tmux-sessionizer.sh"

# Easier window hopping from the home row.
bind h previous-window
bind l next-window
bind Tab last-window

# Quick synchronize-panes toggle with feedback.
bind y if-shell -F '#{pane_synchronized}' \
  'set-window-option synchronize-panes off \; display-message "synchronize-panes off"' \
  'set-window-option synchronize-panes on \; display-message "synchronize-panes on"'

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r < swap-pane -U
bind -r > swap-pane -D

# Copy-mode ergonomics that keep vi-style movement intact.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel


set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[bold]#S"
set -g status-right "#(whoami)@#H | %Y-%m-%d %H:%M"

if-shell '[ -f "$HOME/.config/tmux/flow.conf" ]' 'source-file "$HOME/.config/tmux/flow.conf"'
