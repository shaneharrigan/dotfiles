# Optional tmux visual and flow enhancements.

set -g status-style "bg=colour234,fg=colour252"
set -g message-style "bg=colour238,fg=colour231"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"

# Centre the window list so the current path sits in the middle of the bar.
set -g status-justify centre

set -g status-left-length 40
set -g status-right-length 120

set -g status-left "#[fg=colour81,bold] #S "
set -g status-right "#[fg=colour244]#{?client_prefix,#[fg=colour220]PREFIX ,}#[fg=colour250]%Y-%m-%d #[fg=colour81]%H:%M"

# Active window: show path plus current program, degrading as space gets tight.
# Inactive windows use a smaller budget so crowded bars stay readable.
set -g window-status-current-format "#[fg=colour220] #I:#(\"$HOME/Sources/dotfiles/scripts/tmux-window-title.sh\" \"#{pane_current_path}\" \"#{pane_current_command}\" 42) "
set -g window-status-format "#[fg=colour244] #I:#(\"$HOME/Sources/dotfiles/scripts/tmux-window-title.sh\" \"#{pane_current_path}\" \"#{pane_current_command}\" 22) "
set -g window-status-separator "#[fg=colour238]  "

# Prefix + r reloads tmux config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
